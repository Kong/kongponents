auditConfig:
  ignoreGhsas:
    - GHSA-p9ff-h696-f583
    - GHSA-v2wj-q39q-566r

# Require a package to be published at least 12 days (17280 minutes) before it can be installed
# minimumReleaseAge: 17280
minimumReleaseAgeExclude:
  - '@kong/*'
  - '@kong-ui/*'
  - '@kong-ui-public/*'

onlyBuiltDependencies:
  - '@evilmartians/lefthook'
  - '@parcel/watcher'
  - cypress
  - esbuild
  - vue-demi

overrides:
  '@babel/core@<=7.29.0': '>=7.29.6'
  axios@>=1.0.0 <1.12.0: '>=1.16.1'
  devalue@<=5.6.3: '>=5.8.1'
  esbuild: '>=0.28.1'
  form-data@>=4.0.0 <4.0.6: '>=4.0.6'
  js-yaml@<=4.1.1: '>=4.2.0'
  launch-editor@<=2.14.0: '>=2.14.1'
  lodash@<=4.17.23: '>=4.18.0'
  lodash@>=4.0.0 <=4.17.22: '>=4.17.23'
  lodash@>=4.0.0 <=4.17.23: '>=4.18.0'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
  rollup: 'npm:@rollup/wasm-node'
  shell-quote@>=1.1.0 <=1.8.3: '>=1.8.4'
  tar@<=7.5.15: '>=7.5.16'
  tmp: '>=0.2.7'
  undici@>=7.0.0 <7.28.0: '>=7.28.0 <8.0.0'
  vite: '>=6.4.3'
  ws@>=8.0.0 <8.21.0: '>=8.21.0'

# When set to no-downgrade, pnpm will fail if a package's trust level has decreased compared to previous releases
trustPolicy: no-downgrade
